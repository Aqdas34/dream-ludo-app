org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=false

# ── Gradle Performance ─────────────────────────────────────────
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false

# ── Network Timeouts (fixes "waiting for package manifests") ───
# Connection timeout in ms (default is infinite)
org.gradle.internal.http.connectionTimeout=60000
org.gradle.internal.http.socketTimeout=60000

# ── Kotlin ────────────────────────────────────────────────────
kotlin.code.style=official
# IMPORTANT: Must be FALSE when project (D:\) and pub cache (C:\) are on different drives.
# Kotlin incremental compiler crashes with "different roots" AssertionError cross-drive.
kotlin.incremental=false
kotlin.daemon.jvm.options=-Xmx2g
