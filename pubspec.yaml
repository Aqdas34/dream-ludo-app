name: dream_ludo
description: "DreamLudo - Competitive Ludo Tournament Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ─── Navigation ──────────────────────────────────────────────────
  go_router: ^14.2.7

  # ─── HTTP / API ──────────────────────────────────────────────────
  dio: ^5.6.0
  json_annotation: ^4.9.0

  # ─── WebSocket ───────────────────────────────────────────────────
  web_socket_channel: ^3.0.1
  stomp_dart_client: ^3.0.1
  socket_io_client: ^3.1.2

  # ─── Secure Storage ──────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ─── Firebase ────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # ─── Social Auth ─────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1

  # ─── Image / Media ───────────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ─── UI & UX ─────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  country_code_picker: ^3.0.0
  fluttertoast: ^8.2.8
  pinput: ^5.0.0
  url_launcher: ^6.3.0

  # ─── Utils ───────────────────────────────────────────────────────
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  shared_preferences: ^2.3.2
  logger: ^2.4.0
  get_it: ^8.0.2
  dartz: ^0.10.1

  # ─── Future: Agora (uncomment when ready) ────────────────────────
  # agora_rtc_engine: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  # fonts: (uncomment after placing font files in assets/fonts/)
